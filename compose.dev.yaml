services:
  mongo:
    image: mongo:latest
    restart: always
    ports:
      - 27017:27017
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend
    volumes:
      - leetcode_mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend
  
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=auth_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    
  migrate:
    build:
      context: ./auth_service
      dockerfile: Dockerfile.migrate
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=auth_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_ACCESS_SECRET=local-access-secret-change-in-prod
      - JWT_REFRESH_SECRET=local-refresh-secret-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - backend
  
  registry-service:
    build:
      context: ./registry_service
      dockerfile: Dockerfile.dev
    ports:
      - 3001:3001
    environment:
      - PORT=3001
      - NODE_ENV=development
      - SERVICE_NAME=registry-service
    volumes:
      - ./registry_service/src:/leetcode-server/registry-service/src
      - ./registry_service/package.json:/leetcode-server/registry-service/package.json
      - ./registry_service/tsconfig.json:/leetcode-server/registry-service/tsconfig.json
      - /leetcode-server/registry-service/node_modules
    networks:
      - backend

  problem-service:
    build:
      context: ./problem_service
      dockerfile: Dockerfile.dev
    ports:
      - 3010:3010
    environment:
      - PORT=3010
      - DB_URI=mongodb://mongo:27017/leetcode_problem_service
      - NODE_ENV=development
      - SERVICE_NAME=problem-service
    volumes:
      - ./problem_service/src:/leetcode-server/problem-service/src
      - ./problem_service/package.json:/leetcode-server/problem-service/package.json
      - ./problem_service/tsconfig.json:/leetcode-server/problem-service/tsconfig.json
      - /leetcode-server/problem-service/node_modules
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - backend

  submission-service:
    build:
      context: ./submission_service
      dockerfile: Dockerfile.dev
    ports:
      - 3020:3020
    environment:
      - PORT=3020
      - DB_URI=mongodb://mongo:27017/leetcode_submission_service
      - PROBLEM_SERVICE_URL=http://problem-service:3010/api/v1
      - REDIS_URL=redis://redis:6379
      - SERVICE_NAME=submission-service
      - NODE_ENV=development
      - EVALUATION_JOB_NAME=evaluate-submission
      - SUBMISSION_QUEUE_NAME=submission_queue
      - STATUS_UPDATE_QUEUE_NAME=status_update_queue
      - STATUS_UPDATE_JOB_NAME=update-submission-status
    volumes:
      - ./submission_service/src:/leetcode-server/submission-service/src
      - ./submission_service/package.json:/leetcode-server/submission-service/package.json
      - ./submission_service/tsconfig.json:/leetcode-server/submission-service/tsconfig.json
      - /leetcode-server/submission-service/node_modules    # for this
      # Purpose: Prevents host node_modules from overwriting container's node_modules
      # Why: Container needs Linux-specific binaries, host may have different OS/architecture
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  evaluation-service:
    build:
      context: ./evaluation_service
      dockerfile: Dockerfile.dev
    # ports:
    #   - 3030:3030
    deploy:
      replicas: 3
    ports:
      - 3030-3032:3030
    environment:
      - PORT=3030
      - PROBLEM_SERVICE_URL=http://problem-service:3010/api/v1
      - SUBMISSION_SERVICE_URL=http://submission-service:3020/api/v1
      - REGISTRY_SERVICE_URL=http://registry-service:3001/api/v1
      - REDIS_URL=redis://redis:6379
      - DOCKER_HOST=tcp://dind:2375
      - SERVICE_NAME=evaluation-service
      - EVALUATION_JOB_NAME=evaluate-submission
      - SUBMISSION_QUEUE_NAME=submission_queue
      - STATUS_UPDATE_QUEUE_NAME=status_update_queue
      - STATUS_UPDATE_JOB_NAME=update-submission-status
    volumes:
      - ./evaluation_service/src:/leetcode-server/evaluation-service/src
      - ./evaluation_service/package.json:/leetcode-server/evaluation-service/package.json
      - ./evaluation_service/tsconfig.json:/leetcode-server/evaluation-service/tsconfig.json
      - /leetcode-server/evaluation-service/node_modules
    depends_on:
      redis:
        condition: service_healthy
      dind:
        condition: service_healthy
    networks:
      - backend

  auth-service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile.dev
    command: npm run dev
    ports:
      - 3002:3002
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=auth_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_ACCESS_SECRET=ldfjsdfkEKFHWK#&!#*81273
      - JWT_REFRESH_SECRET=ldfjsdfkEKFHWK#&!#*81273
      - JWT_ACCESS_EXPIRES_IN=1h
      - JWT_REFRESH_EXPIRES_IN=7d
      - PORT=3002
      - NODE_ENV=development
      - SERVICE_NAME=auth-service
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./auth_service/src:/leetcode-server/auth-service/src
      - ./auth_service/package.json:/leetcode-server/auth-service/package.json
      - ./auth_service/tsconfig.json:/leetcode-server/auth-service/tsconfig.json
      - /leetcode-server/auth-service/node_modules
    networks:
      - backend


  # docker inside docker
  # privileged: true is required for Docker-in-Docker (DinD) because the inner Docker daemon (dockerd) needs
  # low-level kernel capabilities that normal containers do not have.
  dind:
    image: docker:24-dind
    restart: always
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  leetcode_mongo_data:
  postgres_data:
