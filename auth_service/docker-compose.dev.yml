services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=auth_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ./
      dockerfile: Dockerfile.migrate
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=auth_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_ACCESS_SECRET=local-access-secret-change-in-prod
      - JWT_REFRESH_SECRET=local-refresh-secret-change-in-prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  auth-service:
    build:
      context: ./
      dockerfile: Dockerfile.dev
    command: npm run dev
    ports:
      - 3004:3004
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=auth_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_ACCESS_SECRET=ldfjsdfkEKFHWK#&!#*81273
      - JWT_REFRESH_SECRET=ldfjsdfkEKFHWK#&!#*81273
      - JWT_ACCESS_EXPIRES_IN=1h
      - JWT_REFRESH_EXPIRES_IN=7d
      - PORT=3004
      - NODE_ENV=development
      - SERVICE_NAME=auth-service
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./src:/auth-service/src
      - ./package.json:/auth-service/package.json
      - ./tsconfig.json:/auth-service/tsconfig.json
      - /auth-service/node_modules

volumes:
  postgres_data:
